<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Try Again</title>

  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Patrick Hand', cursive;
      background: linear-gradient(135deg, #fff0d6, #ffd6e0);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .box {
      background: rgba(255,255,255,0.75);
      padding: 40px;
      border-radius: 25px;
    }

    img {
      width: 150px;
      margin-bottom: 15px;
    }

    p {
      font-size: 1.5em;
      margin-bottom: 20px;
    }

    button {
      background: #ffd6e0;
      border: none;
      padding: 12px 25px;
      border-radius: 25px;
      font-size: 1.1em;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: scale(1.1);
    }
  </style>
</head>

<body>

  <div class="box">
    <img src="chimkandi.png" alt="chimkandi doodle">
    <p>u chimkandi 💢</p>
    <button onclick="goBack()">try again</button>
  </div>

  <script>
    function goBack() {
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
